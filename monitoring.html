<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>モニタリング手法一覧（77手法）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: Meiryo, sans-serif; background:#f5f6f8; margin:0; padding:20px; }
h1 { margin-bottom:8px; }
input[type=text]{width:100%;max-width:520px;padding:10px;font-size:14px;margin-bottom:12px;border-radius:6px;border:1px solid #ccc}
.filters button{margin-right:6px;margin-bottom:6px;padding:6px 12px;border-radius:16px;border:none;cursor:pointer}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}
.card{background:#fff;padding:16px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.1);cursor:pointer}
.category{display:inline-block;padding:2px 8px;font-size:12px;border-radius:12px;color:#fff}
.共通{background:#6A5ACD;}.哺乳類{background:#8B4513;}.鳥類{background:#1E90FF;}.昆虫類{background:#228B22;}.両生類・爬虫類{background:#556B2F;}.魚類{background:#20B2AA;}.底生生物{background:#708090;}.植物（陸生）{background:#2E8B57;}.水生植物（陸水域）{background:#3CB371;}.水生植物（海域）{background:#4682B4;}.サンゴ{background:#FF7F50;}.プランクトン{background:#9370DB;}.水質調査{background:#4169E1;}.底質調査{background:#696969;}.物理環境・化学環境（湿地）{background:#A9A9A9;}.物理環境・化学環境（砂浜）{background:#A9A9A9;}.物理環境・化学環境（海域）{background:#A9A9A9;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
.modal-content{background:#fff;padding:24px;border-radius:8px;max-width:720px;max-height:80vh;overflow:auto}
.close{float:right;cursor:pointer}
</style>
</head>
<body>
<h1>モニタリング手法一覧（全77手法）</h1>
<input type="text" id="searchBox" placeholder="キーワード検索（例：ドローン、DNA、底質…）">
<div class="filters"><button onclick="setCategory('all')">すべて</button></div>
<div id="cards" class="cards"></div>
<div class="modal" id="modal"><div class="modal-content"><span class="close" onclick="closeModal()">×</span><h2 id="mt"></h2><p id="mc"></p><hr><p id="md"></p></div></div>
<script>
const data = [{'name': '目視観察・定点撮影調査', 'category': '共通', 'description': '⽬視観察と写真撮影で、場所の形状や植⽣の変化を把握'}, {'name': '衛星画像・航空写真を用いた調査', 'category': '共通', 'description': '衛星画像・航空写真で、場所の形状や植⽣の変化を把握'}, {'name': '自動撮影カメラ法', 'category': '哺乳類', 'description': '昼夜問わず哺乳類を⾃動撮影'}, {'name': '直接観察・フィールドサインの確認', 'category': '哺乳類', 'description': '歩きながら哺乳類やその痕跡を確認'}, {'name': 'ライトセンサス法', 'category': '哺乳類', 'description': '周辺をライトで照らし、光ったシカ等の⽬を確認'}, {'name': 'トラップ法', 'category': '哺乳類', 'description': '罠で⼩型哺乳類を捕獲'}, {'name': 'ラインセンサス法（ルートセンサス法）', 'category': '鳥類', 'description': '歩きながら⿃類を確認'}, {'name': 'スポットセンサス法（定点センサス法）', 'category': '鳥類', 'description': '定点から⿃類を確認'}, {'name': '鳴き声の録音調査', 'category': '鳥類', 'description': '鳴き声を録⾳して確認し、⿃類の種類を確認'}, {'name': '定点カメラ調査', 'category': '鳥類', 'description': '定点カメラにより⿃類を確認'}, {'name': 'ドローン撮影調査', 'category': '鳥類', 'description': 'ドローンで⿃類を確認'}, {'name': '目視・任意採集', 'category': '昆虫類', 'description': '花に集まったり、⾶んでいたりする昆⾍を確認'}, {'name': 'スウィーピング', 'category': '昆虫類', 'description': '⾍取り網で昆⾍を捕獲'}, {'name': 'ビーティング', 'category': '昆虫類', 'description': '樹上の昆⾍を落として捕獲'}, {'name': 'ピットホールトラップ（ベイトトラップ）', 'category': '昆虫類', 'description': '地表徘徊性昆⾍をトラップで捕獲'}, {'name': 'バナナトラップ', 'category': '昆虫類', 'description': '腐敗したバナナに誘われた昆⾍を捕獲'}, {'name': 'ライトトラップ', 'category': '昆虫類', 'description': '夜⾏性の⾍を光で集めて捕獲'}, {'name': '鳴き声調査', 'category': '昆虫類', 'description': '鳴き声で昆⾍を確認'}, {'name': '林床の探索', 'category': '昆虫類', 'description': '落ち葉等に隠れている昆⾍を確認'}, {'name': '定量採集', 'category': '昆虫類', 'description': '⽔⽣昆⾍を捕獲'}, {'name': '直接観察法', 'category': '両生類・爬虫類', 'description': '両⽣類・爬⾍類を直接確認'}, {'name': '捕獲調査', 'category': '両生類・爬虫類', 'description': '両⽣類・爬⾍類をトラップで捕獲'}, {'name': '卵塊調査', 'category': '両生類・爬虫類', 'description': '両⽣類の卵塊をカウント'}, {'name': '鳴き声調査', 'category': '両生類・爬虫類', 'description': 'カエルの鳴き声で⽣息する種を確認'}, {'name': '環境DNA分析', 'category': '両生類・爬虫類', 'description': '環境⽔中のDNAを分析し⽣物種の痕跡を推定'}, {'name': '目視観察', 'category': '魚類', 'description': '⽬視により⿂類や産卵床を確認'}, {'name': '捕獲調査', 'category': '魚類', 'description': '漁具を⽤いて⿂類等を採捕、確認'}, {'name': '潜水観察', 'category': '魚類', 'description': 'ダイバーが⽔中で⿂類の⽣息、回遊状況を⽬視、撮影'}, {'name': '環境DNA分析', 'category': '魚類', 'description': '環境⽔中のDNAを分析し⽣物種の痕跡を推定'}, {'name': '水中ドローン調査', 'category': '魚類', 'description': '⽔中ドローンで⽔中の状況を観察'}, {'name': '任意採集（定性採集）', 'category': '底生生物', 'description': '⼿網などで底⽣⽣物を採取'}, {'name': '採泥調査', 'category': '底生生物', 'description': '採泥器などで底質もろとも底⽣⽣物を採取'}, {'name': 'コドラート法・枠取り法', 'category': '底生生物', 'description': 'コドラート内の底⽣⽣物を泥質もろとも採泥器、採集容器などで採取'}, {'name': 'コドラート法', 'category': '植物（陸生）', 'description': '調査枠内の植物群落の状況を調査'}, {'name': '植物相調査', 'category': '植物（陸生）', 'description': '調査地に⽣育する植物の種類を記録'}, {'name': '毎木調査', 'category': '植物（陸生）', 'description': '森林の樹⽊の種類や林内の構造を把握'}, {'name': 'リター・シードトラップ', 'category': '植物（陸生）', 'description': '落ち葉や種の種類や量を記録'}, {'name': '衛星画像・航空写真を用いた調査', 'category': '植物（陸生）', 'description': '写真から植物の分布を把握'}, {'name': 'ドローン撮影調査', 'category': '植物（陸生）', 'description': 'ドローンで上空から植物を確認'}, {'name': '観察法（目視、採取）', 'category': '水生植物（陸水域）', 'description': '⽬視⼜は採取によって⽔⽣植物の種類を記録'}, {'name': '定量調査', 'category': '水生植物（陸水域）', 'description': '⽔⽣植物採集器を使⽤し、⽔⽣植物の種類や量を記録'}, {'name': 'コドラート法', 'category': '水生植物（陸水域）', 'description': '調査区内の植物群落の状況を調査'}, {'name': '沈水・浮葉植物帯調査', 'category': '水生植物（陸水域）', 'description': '沈⽔・浮葉植物の分布の幅を記録'}, {'name': 'ドローン撮影調査', 'category': '水生植物（陸水域）', 'description': 'ドローンで上空から植物を確認'}, {'name': 'ベルトトランセクト法（ライン調査）', 'category': '水生植物（海域）', 'description': 'ベルト状に設置した調査区内の植物群落の状況を調査'}, {'name': '定量的な標本採集', 'category': '水生植物（海域）', 'description': '海草・海藻を採取して種類を調査'}, {'name': '衛星画像・航空写真を用いた調査', 'category': '水生植物（海域）', 'description': '写真から藻場の分布を把握'}, {'name': 'ドローン空撮調査', 'category': '水生植物（海域）', 'description': 'ドローンで上空から藻場の分布を把握'}, {'name': '水上・水中ドローン調査', 'category': '水生植物（海域）', 'description': '⽔上・⽔中ドローンで藻場の状況を観察'}, {'name': '魚群探知機による音響測量調査', 'category': '水生植物（海域）', 'description': '⿂群探知機による⾳響測量で藻場分布を推定'}, {'name': 'スポットチェック法', 'category': 'サンゴ', 'description': '固定調査地点（スポット）において、潜⽔⽬視観察でサンゴの状態を確認'}, {'name': '測点調査：コドラート法', 'category': 'サンゴ', 'description': '正⽅形の調査枠（コドラート）において、潜⽔⽬視観察でサンゴの状態を確認'}, {'name': '広域調査：マンタ法', 'category': 'サンゴ', 'description': '観測者を調査船で曳航して、サンゴの分布状況を把握'}, {'name': '測線調査：ベルトトランセクト法', 'category': 'サンゴ', 'description': '測線に沿って潜⽔移動しながら、サンゴの分布状況を連続的に観察'}, {'name': '潜水目視調査', 'category': 'サンゴ', 'description': 'ダイバーがサンゴに⽣息する⽣物やサンゴの⾷害状況を⽬視、撮影記録'}, {'name': 'ドローン空撮調査', 'category': 'サンゴ', 'description': 'ドローンで上空からサンゴの分布を把握'}, {'name': '水上・水中ドローン調査', 'category': 'サンゴ', 'description': '⽔上・⽔中ドローンでサンゴの状況を観察'}, {'name': '採水・ネット捕捉調査', 'category': 'プランクトン', 'description': 'プランクトンを捕捉・分析'}, {'name': '水温', 'category': '⽔質調査', 'description': '⽔温計で⽔温を測定'}, {'name': '水位', 'category': '⽔質調査', 'description': '⽔位標で⽔位を測'}, {'name': '流速', 'category': '⽔質調査', 'description': '流速を測定'}, {'name': '流量', 'category': '⽔質調査', 'description': '流量を測定'}, {'name': '透視度／透明度', 'category': '⽔質調査', 'description': '透視度/透明度を測定'}, {'name': '水色', 'category': '⽔質調査', 'description': '⽔⾊計で⽔⾊を測定'}, {'name': 'pH', 'category': '⽔質調査', 'description': 'pHを測定'}, {'name': '栄養塩濃度', 'category': '⽔質調査', 'description': '栄養塩濃度を測定'}, {'name': '泥温', 'category': '底質調査', 'description': '棒状温度計で泥温を測定'}, {'name': '外観（性状）', 'category': '底質調査', 'description': '底質の状態(粒度)を観測･識別'}, {'name': '泥臭（臭気）', 'category': '底質調査', 'description': '泥臭を観測'}, {'name': '泥色（色相）', 'category': '底質調査', 'description': '泥⾊を観測'}, {'name': '酸化還元電位（ORP）', 'category': '底質調査', 'description': '底質表層の酸化還元電位を測定'}, {'name': '全硫化物', 'category': '底質調査', 'description': '底質中の硫化物を測定'}, {'name': '地下水位／地温調査', 'category': '物理環境・化学環境（湿地）', 'description': 'データロガー等を⽤いて地下⽔位や地温を測定'}, {'name': '土砂量調査', 'category': '物理環境・化学環境（湿地）', 'description': '沈砂地等に溜まった⼟砂量を測定'}, {'name': '汀線測量', 'category': '物理環境・化学環境（砂浜）', 'description': '測量により汀線の状況を把握'}, {'name': '汀線観測', 'category': '物理環境・化学環境（砂浜）', 'description': '衛星画像により汀線の状況を把握'}, {'name': '赤土堆積礁のSPSSの計測', 'category': '物理環境・化学環境（海域）', 'description': '透視度を想定し、底質中懸濁物質含量を算出'}];
const cards = document.getElementById('cards');
const searchBox = document.getElementById('searchBox');
let currentCategory = 'all';

// build category buttons
const categories = [...new Set(data.map(d => d.category))];
const filterArea = document.querySelector('.filters');
categories.forEach(c => { const b=document.createElement('button'); b.innerText=c; b.onclick=()=>setCategory(c); filterArea.appendChild(b); });

function render(){
  const kw = searchBox.value.trim().toLowerCase();
  cards.innerHTML='';
  data.filter(d => currentCategory==='all' || d.category===currentCategory)
      .filter(d => !kw || d.name.toLowerCase().includes(kw) || d.category.toLowerCase().includes(kw) || d.description.toLowerCase().includes(kw))
      .forEach(d => {
        const div=document.createElement('div'); div.className='card';
        div.innerHTML=`<div><b>${d.name}</b></div><span class="category ${d.category}">${d.category}</span>`;
        div.onclick=()=>openModal(d); cards.appendChild(div);
      });
}
function setCategory(cat){ currentCategory=cat; render(); }
function openModal(d){ mt.innerText=d.name; mc.innerText='区分：'+d.category; md.innerText=d.description; modal.style.display='flex'; }
function closeModal(){ modal.style.display='none'; }
searchBox.addEventListener('input', render);
render();
</script>
</body>
</html>
